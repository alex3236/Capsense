name: Rust CI & Release

on:
  push:
    branches: [ "master" ]
    tags:
      - 'v*'
  pull_request:
    branches: [ "master" ]
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., v0.2.1)'
        required: true
        type: string

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

env:
  CARGO_TERM_COLOR: always

jobs:
  build:
    name: Build - ${{ matrix.os }}
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        os: [ windows-latest ]

    steps:
      - uses: actions/checkout@v6
        with:
          fetch-depth: 0

      - name: Rust Cache
        uses: Swatinem/rust-cache@v2

      - name: Build
        shell: powershell
        run: |
          .\build-all.ps1

      - name: Archive production artifacts
        uses: actions/upload-artifact@v6
        with:
          name: Capsense-${{ matrix.os }}
          path: target/release/*.exe

  release:
    name: Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          name: Capsense-windows-latest
          path: artifacts/

      - name: Get Release Notes
        id: release_notes
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            # Manual release
            TAG_NAME="${{ inputs.version }}"
            COMMIT_MSG="Manual release from workflow_dispatch"
          else
            # Tag-based release
            TAG_NAME=${GITHUB_REF#refs/tags/}
            COMMIT_MSG=$(git log -1 --format=%B)
          fi
          
          # Get previous tag
          PREV_TAG=$(git describe --tags --abbrev=0 ${TAG_NAME}^ 2>/dev/null || echo "")
          
          if [ -z "$PREV_TAG" ]; then
            CHANGELOG_LINK="[See all commits](https://github.com/${{ github.repository }}/commits/${TAG_NAME})"
          else
            CHANGELOG_LINK="[See commits since \`$PREV_TAG\`](https://github.com/${{ github.repository }}/compare/${PREV_TAG}...${TAG_NAME})"
          fi
          
          echo "BODY<<EOF" >> $GITHUB_ENV
          echo "$COMMIT_MSG" >> $GITHUB_ENV
          echo "" >> $GITHUB_ENV
          echo "$CHANGELOG_LINK" >> $GITHUB_ENV
          echo "EOF" >> $GITHUB_ENV
          
          echo "TAG_NAME=$TAG_NAME" >> $GITHUB_ENV

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ env.TAG_NAME }}
          body: ${{ env.BODY }}
          files: |
            artifacts/Capsense.exe
            artifacts/Capsense-headless.exe
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
